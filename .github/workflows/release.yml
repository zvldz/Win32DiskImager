name: Build

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: msys2 {0}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Static Qt 6 pulls in many third-party libs at link time (image codecs,
      # SSL, fonts, text layout, compression). MSYS2's qt6-static does not
      # declare all of them as hard deps, so list each explicitly. Missing any
      # surfaces as "cannot find -lXXX" from ld during the final link step.
      - name: Setup MSYS2 + static Qt 6 + MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          release: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-qt6-static
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libdeflate
            mingw-w64-x86_64-jbigkit
            mingw-w64-x86_64-lerc
            mingw-w64-x86_64-xz
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-bzip2
            mingw-w64-x86_64-brotli
            mingw-w64-x86_64-libb2
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pcre2
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-graphite2
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-double-conversion
            mingw-w64-x86_64-md4c
            mingw-w64-x86_64-qt6-translations

      # Tag pushes ship as proper releases. Anything else (manual
      # workflow_dispatch, branch pushes if we ever wire those up) gets
      # a "-dev" SemVer pre-release suffix baked into the binary so the
      # auto-update checker can rank a real release ABOVE that build.
      - name: Detect build kind
        id: build_kind
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "extra_qmake_args=" >> "$GITHUB_OUTPUT"
            echo "version_suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "extra_qmake_args=DEFINES+=WDI_DEV_BUILD" >> "$GITHUB_OUTPUT"
            echo "version_suffix=-dev" >> "$GITHUB_OUTPUT"
          fi

      # Static Qt in MSYS2 lives under /mingw64/qt6-static/. The GUI build uses
      # compile-gui-static.bat's qmake path via QT_STATIC_BIN; here we invoke
      # qmake directly from that directory so the rest is identical logic.
      - name: Build GUI (static Qt)
        run: |
          set -euo pipefail
          mkdir -p bin/gui-static-build
          cd bin/gui-static-build
          EXTRA="${{ steps.build_kind.outputs.extra_qmake_args }}"
          if [ -n "$EXTRA" ]; then
            /mingw64/qt6-static/bin/qmake6 ../../src/DiskImager.pro "DESTDIR=.." "$EXTRA"
          else
            /mingw64/qt6-static/bin/qmake6 ../../src/DiskImager.pro "DESTDIR=.."
          fi
          mingw32-make -j2

      - name: Build CLI (native, no Qt)
        run: |
          set -euo pipefail
          mkdir -p bin/cli-build
          cd bin/cli-build
          EXTRA="${{ steps.build_kind.outputs.extra_qmake_args }}"
          if [ -n "$EXTRA" ]; then
            /mingw64/qt6-static/bin/qmake6 ../../src/DiskImagerCli.pro "DESTDIR=.." "$EXTRA"
          else
            /mingw64/qt6-static/bin/qmake6 ../../src/DiskImagerCli.pro "DESTDIR=.."
          fi
          mingw32-make -j2

      - name: Read version from version.h
        id: version
        shell: bash
        run: |
          set -euo pipefail
          MAJOR=$(awk '/^#define APP_VERSION_MAJOR/{print $3; exit}' src/version.h)
          MINOR=$(awk '/^#define APP_VERSION_MINOR/{print $3; exit}' src/version.h)
          PATCH=$(awk '/^#define APP_VERSION_PATCH/{print $3; exit}' src/version.h)
          V="${MAJOR}.${MINOR}.${PATCH}${{ steps.build_kind.outputs.version_suffix }}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "App version: ${V}"

      # Inno Setup setup.iss expects a Release/ sibling directory.
      # Static GUI needs no Qt DLLs / platforms plugin. Translations stay on
      # disk so the runtime QTranslator::load("translations/diskimager_...")
      # path (see main.cpp) keeps working.
      - name: Stage files for installer
        run: |
          set -euo pipefail
          mkdir -p Release/translations
          cp bin/Win32DiskImager.exe     Release/
          cp bin/Win32DiskImager-cli.exe Release/
          cp src/lang/*.qm               Release/translations/ 2>/dev/null || true
          # Qt's standard widget translations (Yes / No / OK / Cancel,
          # QMessageBox default buttons, file-dialog labels). The
          # mingw-w64-x86_64-qt6-translations package ships them; search
          # the filesystem instead of hardcoding a path because the
          # MSYS2 install location has moved across package versions.
          echo "Locating qtbase_*.qm via pacman -Ql:"
          pacman -Ql mingw-w64-x86_64-qt6-translations 2>/dev/null \
            | awk '/qtbase_[a-z_A-Z]+\.qm$/{print $2}' \
            | tee /tmp/qtbase-paths.txt
          for loc in es it pl nl de fr zh_CN zh_TW ta_IN ko ja uk; do
            # `|| true` so grep returning 1 (no match — expected for
            # locales Qt doesn't translate, e.g. ta_IN) doesn't trip
            # set -e and abort the whole staging step.
            src=$(grep -E "/qtbase_${loc}\.qm$" /tmp/qtbase-paths.txt | head -1 || true)
            if [ -n "$src" ] && [ -f "$src" ]; then
              cp "$src" Release/translations/
              echo "  staged qtbase_$loc.qm from $src"
            else
              echo "  skip $loc — no qtbase_$loc.qm"
            fi
          done

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress --confirm

      - name: Build installer
        shell: bash
        run: |
          set -euo pipefail
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          "$ISCC" setup.iss
          ls -la Output/

      # Portable ZIP bundles — match the upstream artifact layout in bin/.
      - name: Package portable zips
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $V = '${{ steps.version.outputs.version }}'
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Compress-Archive -Path bin/Win32DiskImager.exe     -DestinationPath "artifacts/Win32DiskImager-$V.zip"     -Force
          Compress-Archive -Path bin/Win32DiskImager-cli.exe -DestinationPath "artifacts/Win32DiskImager-cli-$V.zip" -Force
          Copy-Item Output/*.exe artifacts/

      # Three separate artifacts so the Actions run page shows three distinct
      # downloads. GitHub still zip-wraps each one on download, but each wrapper
      # contains exactly one file (installer / gui zip / cli zip).
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Win32DiskImager-setup-${{ steps.version.outputs.version }}
          path: artifacts/Win32DiskImager-setup-${{ steps.version.outputs.version }}.exe
          if-no-files-found: error

      - name: Upload GUI portable
        uses: actions/upload-artifact@v4
        with:
          name: Win32DiskImager-${{ steps.version.outputs.version }}
          path: artifacts/Win32DiskImager-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Upload CLI portable
        uses: actions/upload-artifact@v4
        with:
          name: Win32DiskImager-cli-${{ steps.version.outputs.version }}
          path: artifacts/Win32DiskImager-cli-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
